user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main_json escape=json
      '{"time":"$time_iso8601","remote_addr":"$remote_addr","cf_ip":"$http_cf_connecting_ip","request":"$request","status":$status,"body_bytes":$body_bytes_sent,"req_time":$request_time,"upstream_time":"$upstream_response_time","host":"$host","ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    # Next.js zaten optimize JS+CSS uretiyor; nginx gzip + brotli ile
    # transport boyutunu kucult.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json application/javascript application/xml text/css text/plain text/xml image/svg+xml font/woff font/woff2;

    # Web frontend icin rate limit — DDoS koruma. SSR sayfasi pahali oldugu icin
    # API'den daha sıkı.
    limit_req_zone $binary_remote_addr zone=web_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web_api:10m rate=60r/s;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Next.js upstream — web container 127.0.0.1:3000'de calisiyor.
    # network_mode: host oldugu icin nginx host'tan dogrudan erisir.
    upstream nextjs_upstream {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    include /etc/nginx/conf.d/*.conf;
}
