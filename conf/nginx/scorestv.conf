# ===================================================================
# scorestv.com + www.scorestv.com → Next.js (port 3000)
# SSL: Let's Encrypt (certbot) — /etc/letsencrypt/live/scorestv.com/
# Cloudflare onunde olsa bile origin'de TLS sart (Full Strict).
# ===================================================================

# HTTP → HTTPS redirect + Let's Encrypt http-01 challenge
server {
    listen 80;
    listen [::]:80;
    server_name scorestv.com www.scorestv.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Geri kalan her sey HTTPS'e
    location / {
        return 301 https://$host$request_uri;
    }
}

# www → apex redirect (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.scorestv.com;

    ssl_certificate     /etc/letsencrypt/live/scorestv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scorestv.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://scorestv.com$request_uri;
}

# ==== Ana sunucu blok: scorestv.com ====
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name scorestv.com;

    ssl_certificate     /etc/letsencrypt/live/scorestv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scorestv.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Guvenlik header'lari (Cloudflare zaten ekliyor olabilir, double safety)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 1) Next.js static asset'leri — uzun cache (immutable)
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 2) Public klasoru (favicon, robots, sitemap, og-image vb.)
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml|manifest\.json|.*\.svg|.*\.png|.*\.jpg|.*\.webp)$ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # 3) BFF API rotalari (Next.js /api/*) — daha gevşek rate, no cache
    location /api/ {
        limit_req zone=web_api burst=80 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # 4) Diger her sey — SSR sayfalari
    location / {
        limit_req zone=web_general burst=40 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;

        # WebSocket destegi (live update'ler backend WS uzerinden gelir;
        # ileride client tarafindan da gerekirse hazir)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Next.js SSR cold start veya backend yavasligi icin tampon
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}
